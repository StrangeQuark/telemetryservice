# Integration file: GHA
name: TelemetryService Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, linux-agent]

    env:
      VAULT_URL: ${{ secrets.VAULT_URL }} # Integration line: Vault
      CICD_TOKEN: ${{ secrets.CICD_TOKEN }} # Integration line: Vault

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        # Integration function start: Vault
      - name: Retrieve Env Vars from Vault
        run: |
          echo "Requesting environment variables from Vault..."

          response=$(curl -s \
            -H "X-CICD-TOKEN: $CICD_TOKEN" \
            "$VAULT_URL/api/vault/cicd/telemetryservice/e3")

          echo "$response" | jq -r 'to_entries | .[] | "\(.key)=\(.value)"' > telemetryservice.env

          echo "Environment variables written to telemetryservice.env"
        # Integration function end: Vault
      - name: Deploy & Health Check
        run: |
          set -e

          docker compose --env-file telemetryservice.env up --build -d

          max_retries=40
          retry_interval=15
          success=0

          for i in $(seq 1 $max_retries); do
            echo "Health check attempt $i..."

            if curl -s -f http://localhost:6050/api/telemetry/health > /dev/null; then
              echo "App is healthy"
              success=1
              break
            else
              echo "Health check failed, retrying in $retry_interval seconds..."
              sleep $retry_interval
            fi
          done

          if [ $success -ne 1 ]; then
            echo "Health check ultimately failed. Tearing down containers."
            docker compose down
            exit 1
          fi
        # Integration function start: Vault
      - name: Cleanup
        if: always()
        run: |
          rm -f telemetryservice.env
          echo "Cleaned up telemetryservice.env"
        # Integration function end: Vault
